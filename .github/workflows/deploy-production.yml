name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag / branch) to deploy"
        required: true
        default: main
  push:
    tags: ["v*.*.*"]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  COMPOSE_FILE: docker-compose.yml

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ecommerce.example.com
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Confirm tag is signed
        run: |
          if [[ "${{ github.ref_type }}" != "tag" && -z "${{ github.event.inputs.ref }}" ]]; then
            echo "Refusing to deploy — production requires a tag or manual dispatch"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & roll production stack
        run: |
          TAG="${{ github.event.inputs.ref || github.ref_name }}"
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${TAG}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${TAG}

          docker compose -f $COMPOSE_FILE pull frontend backend
          docker compose -f $COMPOSE_FILE up -d --remove-orphans frontend backend

      - name: Health check
        run: |
          sleep 30
          curl -fsSL https://ecommerce.example.com/health || (echo "Health check failed" && exit 1)

      - name: Notify
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deploy ${{ job.status }} — ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
