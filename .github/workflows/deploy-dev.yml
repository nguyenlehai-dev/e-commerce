name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches: [develop]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  COMPOSE_FILE: docker-compose.yml

jobs:
  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.ecommerce.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & roll dev stack
        run: |
          echo "Pulling latest develop images…"
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:develop
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:develop

          echo "Restarting services…"
          docker compose -f $COMPOSE_FILE pull frontend backend
          docker compose -f $COMPOSE_FILE up -d --remove-orphans frontend backend

          echo "Pruning dangling images…"
          docker image prune -f

      - name: Health check
        run: |
          sleep 15
          curl -fsSL https://dev.ecommerce.example.com/health || (echo "Health check failed" && exit 1)

      - name: Notify
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Dev deploy ${{ job.status }} — ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
