name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  COMPOSE_FILE: docker-compose.yml

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.ecommerce.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & roll staging stack
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:staging
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:staging

          docker compose -f $COMPOSE_FILE pull frontend backend
          docker compose -f $COMPOSE_FILE up -d --remove-orphans frontend backend

      - name: Health check
        run: |
          sleep 20
          curl -fsSL https://staging.ecommerce.example.com/health || (echo "Health check failed" && exit 1)
